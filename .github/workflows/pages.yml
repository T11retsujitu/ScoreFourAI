# web/ (3D 対局アプリ + WASM エンジン) を GitHub Pages へデプロイする。
# configure-pages の enablement:true で Pages の自動有効化を試みる。権限/組織設定で
# 自動有効化できない場合は、初回のみ Settings > Pages > Source を "GitHub Actions" に
# 手動で変更すること。engine.wasm はコミット済みなのでビルドせず静的配信するだけ。
name: Deploy web app to Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # Pages が未有効なら自動で有効化を試みる
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
